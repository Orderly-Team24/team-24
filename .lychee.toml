# Lychee link checker configuration

exclude = [
    "https://www.figma.com/*",
    "https://keen-pegasus-a95a6a.netlify.app/",
    ".*PUBLIC_URL.*",
    # GitHub settings pages require authentication — always 404 for unauthenticated lychee
    "https://github.com/.*/settings/.*",
    # Render free-tier root paths return 404 (no root route); individual API endpoints are tested separately
    "https://team-24-1.onrender.com",
    # Issue numbers referenced in docs/reports don't reliably resolve — many
    # predate a repo history reset (see the `backup-before-cleanup` tag) and
    # 404 permanently regardless of auth/rate-limiting (73 distinct broken
    # issue links across 9 files as of 2026-07-22, including currently
    # maintained docs, not just old weekly archives). Not fixable by
    # touching lychee's request pattern — excluding the whole category
    # rather than link-by-link, since new dead links would be just as
    # unfixable here.
    "https://github.com/.*/issues/[0-9]+",
    # TEMPORARY: GitHub Pages (docs/index.md) only builds from main, so this
    # 404s on every PR that adds/changes it, before main has ever seen the
    # content. Remove this line in a follow-up PR once the site is confirmed
    # live at https://orderly-team24.github.io/team-24/ after merging.
    "https://orderly-team24.github.io/team-24/",
    # TEMPORARY: CONTRIBUTING.md and AGENTS.md live at the repo root, outside
    # the /docs Pages source — docs/index.md links to them via absolute
    # GitHub blob URLs (a relative link would 404 on the hosted Pages site,
    # which only serves /docs). Same chicken-and-egg as the Pages link
    # above: 404s on this PR because main hasn't seen the files yet. Remove
    # these two lines in a follow-up PR once this PR is merged.
    "https://github.com/Orderly-Team24/team-24/blob/main/CONTRIBUTING.md",
    "https://github.com/Orderly-Team24/team-24/blob/main/AGENTS.md",
    "file://.*"
]

include_extensions = [
    "md",
    "txt",
    "html",
    "htm"
]

max_retries = 3
retry_wait = 30

# GitHub's secondary (abuse-detection) rate limit kicks in on high request
# concurrency even with an authenticated token — this repo has 600+ links
# to github.com across weekly reports, and lychee's default concurrency
# (128) was tripping it, causing 404/429 failures unrelated to the actual
# links being checked.
max_concurrency = 4